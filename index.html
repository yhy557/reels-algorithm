<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Advanced Interface</title>
    <script src="a.js" defer></script>
    <style>
        .image-container {
            position: relative;
            display: inline-block;
        }

        #imagePlace {
            width: auto;
            height: 400px;
            display: block;
            background-color: #333;
        }

        .centered-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; 
            height: auto;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body style="background-color: black;">

    <br><br><br><br><br><br>

    <center>
        <div style="display: flex; align-items: center; justify-content: center; gap: 15px; color: wheat; font-family: sans-serif;">
            <div class="image-container">
                <img id="imagePlace" src="" style="width: auto; height: 400px; display: block; background-color: #333;">
                <img src="images/like.png" class="centered-icon">
            </div>

            <div style="color: wheat; font-family: sans-serif; text-align: center; gap: 15px;">
                <img src="images/like.png" style="width: 50px; margin-left: 37px;">

                <button id="likeBtn">Like</button>
                <br>
                <label id="counterLikes" style="font-weight: bold; font-size: 32px;">0</label>
            </div>

        </div>

        <br>
        <label id="videoLabel" style="color: wheat; font-size: 20px;">This is a label tag</label>
        <br><br>
        <button id="btn">Click</button>
        <button id="stopBtn">Stop</button>
        <br><br>
        <label id="elapsedTime" style="color: wheat; font-size: 24px;">0</label>
    </center>

    <div style="position: fixed; bottom: 20px; left: 20px; color: wheat; font-family: sans-serif; text-align: center;">
        
        <div style="display: inline-block; margin-right: 15px;">
            <label>FruitPercentage</label><br>
            <label id="percentF" style="font-weight: bold; font-size: 20px;">0</label>
        </div>

        <div style="display: inline-block; margin-right: 15px;">
            <label>CarPercentage</label><br>
            <label id="percentC" style="font-weight: bold; font-size: 20px;">0</label>
        </div>

        <div style="display: inline-block; margin-right: 15px;">
            <label>CountryPercentage</label><br>
            <label id="percentCo" style="font-weight: bold; font-size: 20px;">0</label>
        </div>

    </div>

    <div style="position: fixed; bottom: 20px; right: 20px; color: wheat; font-family: sans-serif;">
    <table style="border-collapse: collapse; text-align: center; background-color: rgba(51, 51, 51, 0.5); border-radius: 8px;">
        <thead>
            <tr style="border-bottom: 1px solid wheat;">
                <th style="padding: 10px;">Category</th>
                <th style="padding: 10px;">Count</th>
                <th style="padding: 10px;">Likes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="padding: 10px;">Fruits</td>
                <td id="counterFruit" style="font-weight: bold; font-size: 20px; padding: 10px;">0</td>
                <td id="fruitsLike" style="font-weight: bold; font-size: 20px; padding: 10px; color: #ffcc00;">0</td>
            </tr>
            <tr>
                <td style="padding: 10px;">Cars</td>
                <td id="counterCar" style="font-weight: bold; font-size: 20px; padding: 10px;">0</td>
                <td id="carsLike" style="font-weight: bold; font-size: 20px; padding: 10px; color: #ffcc00;">0</td>
            </tr>
            <tr>
                <td style="padding: 10px;">Countries</td>
                <td id="counterCountries" style="font-weight: bold; font-size: 20px; padding: 10px;">0</td>
                <td id="countriesLike" style="font-weight: bold; font-size: 20px; padding: 10px; color: #ffcc00;">0</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
